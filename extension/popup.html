<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell" id="shell">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <svg
            class="logo-icon"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="32" height="32" rx="8" fill="url(#grad)" />
            <path
              d="M8 10h16M8 16h10M8 22h13"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <circle cx="24" cy="22" r="3" fill="#ffd60a" />
            <defs>
              <linearGradient
                id="grad"
                x1="0"
                y1="0"
                x2="32"
                y2="32"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#0f0f23" />
                <stop offset="1" stop-color="#1a1a3e" />
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">Sumly</span>
        </div>
        <div class="header-actions">
          <button
            class="icon-btn"
            id="settingsBtn"
            title="Settings"
            aria-label="Open settings"
          >
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
          <button
            class="icon-btn theme-toggle"
            id="themeToggle"
            title="Toggle theme"
            aria-label="Toggle dark/light mode"
          >
            <svg class="sun-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                clip-rule="evenodd"
              />
            </svg>
            <svg class="moon-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Page info -->
      <div class="page-info" id="pageInfo">
        <div class="page-favicon" id="pageFavicon"></div>
        <div class="page-meta">
          <div class="page-title" id="pageTitle">Loading page info…</div>
          <div class="page-url" id="pageUrl"></div>
        </div>
        <div
          class="cache-badge hidden"
          id="cacheBadge"
          title="Loaded from cache"
        >
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M8 2a6 6 0 100 12A6 6 0 008 2zM1 8a7 7 0 1114 0A7 7 0 011 8zm7-3a1 1 0 011 1v2.586l1.707 1.707a1 1 0 01-1.414 1.414l-2-2A1 1 0 016 9V6a1 1 0 012 0z"
            />
          </svg>
          Cached
        </div>
      </div>

      <!-- Main content area -->
      <main class="main" id="main">
        <!-- Idle state -->
        <div class="state-idle" id="stateIdle">
          <div class="idle-art">
            <div class="idle-rings">
              <div class="ring"></div>
              <div class="ring"></div>
              <div class="ring"></div>
            </div>
            <div class="idle-icon">
              <svg viewBox="0 0 48 48" fill="none">
                <path
                  d="M8 12h32M8 20h24M8 28h28M8 36h20"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>
            </div>
          </div>
          <p class="idle-hint">Ready to summarize this page with AI</p>
        </div>

        <!-- Loading state -->
        <div class="state-loading hidden" id="stateLoading">
          <div class="loader-wrap">
            <div class="loader-orbit">
              <div class="loader-dot"></div>
            </div>
            <div class="loader-pulse"></div>
          </div>
          <div class="loading-steps">
            <div class="loading-step active" id="step1">
              <span class="step-dot"></span>Extracting page content
            </div>
            <div class="loading-step" id="step2">
              <span class="step-dot"></span>Analyzing with AI
            </div>
            <div class="loading-step" id="step3">
              <span class="step-dot"></span>Structuring summary
            </div>
          </div>
        </div>

        <!-- Error state -->
        <div class="state-error hidden" id="stateError">
          <div class="error-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"
              />
            </svg>
          </div>
          <p class="error-title">Something went wrong</p>
          <p class="error-msg" id="errorMsg">Unable to summarize this page.</p>
          <button class="btn-secondary" id="retryBtn">Try Again</button>
        </div>

        <!-- Results state -->
        <div class="state-results hidden" id="stateResults">
          <!-- Reading time chip -->
          <div class="results-meta">
            <span class="meta-chip" id="readingTimeChip">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
                  clip-rule="evenodd"
                />
              </svg>
              <span id="readingTime">—</span> min read
            </span>
            <span class="meta-chip" id="wordCountChip">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path
                  d="M9 4.5a1 1 0 01-1 1H4a1 1 0 010-2h4a1 1 0 011 1zm0 3a1 1 0 01-1 1H4a1 1 0 110-2h4a1 1 0 011 1zm0 3a1 1 0 01-1 1H4a1 1 0 110-2h4a1 1 0 011 1zm3-9a1 1 0 012 0v10a1 1 0 11-2 0V1.5zM1 4.5a1 1 0 011-1h.5a1 1 0 010 2H2a1 1 0 01-1-1zm0 3a1 1 0 011-1h.5a1 1 0 010 2H2a1 1 0 01-1-1zm0 3a1 1 0 011-1h.5a1 1 0 110 2H2a1 1 0 01-1-1z"
                />
              </svg>
              <span id="wordCount">—</span> words
            </span>
          </div>

          <!-- Summary section -->
          <section class="result-section">
            <div class="section-label">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path
                  d="M5 3a2 2 0 00-2 2v6a2 2 0 002 2h6a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z"
                />
              </svg>
              Summary
            </div>
            <ul class="summary-list" id="summaryList"></ul>
          </section>

          <!-- Key insights section -->
          <section class="result-section">
            <div class="section-label">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path
                  d="M8 1a7 7 0 100 14A7 7 0 008 1zM0 8a8 8 0 1116 0A8 8 0 010 8zm8-3.5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 018 4.5zm0 7a1 1 0 110-2 1 1 0 010 2z"
                />
              </svg>
              Key Insights
            </div>
            <div class="insights-list" id="insightsList"></div>
          </section>

          <!-- Topics -->
          <section class="result-section">
            <div class="section-label">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path
                  d="M2 2a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2H2zm0 1h12a1 1 0 011 1v8a1 1 0 01-1 1H2a1 1 0 01-1-1V4a1 1 0 011-1z"
                />
                <path
                  d="M4 6.5a.5.5 0 01.5-.5h7a.5.5 0 010 1h-7a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h4a.5.5 0 010 1h-4a.5.5 0 01-.5-.5z"
                />
              </svg>
              Topics
            </div>
            <div class="tags-wrap" id="tagsList"></div>
          </section>

          <!-- Highlight toggle -->
          <div class="highlight-toggle">
            <label class="toggle-label" for="highlightToggle">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path
                  d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"
                />
              </svg>
              Highlight key phrases on page
            </label>
            <div class="toggle-wrap">
              <input
                type="checkbox"
                id="highlightToggle"
                class="toggle-input"
              />
              <span class="toggle-track">
                <span class="toggle-thumb"></span>
              </span>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer actions -->
      <footer class="footer">
        <div class="footer-left">
          <button class="btn-ghost" id="clearBtn" title="Clear summary">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                clip-rule="evenodd"
              />
            </svg>
            Clear
          </button>
          <button class="btn-ghost" id="copyBtn" title="Copy summary">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
              <path
                d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"
              />
            </svg>
            Copy
          </button>
        </div>
        <button class="btn-primary" id="summarizeBtn">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path
              d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
            />
          </svg>
          Summarize Page
        </button>
      </footer>

      <!-- Settings panel -->
      <div class="settings-panel hidden" id="settingsPanel">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button
            class="icon-btn"
            id="closeSettings"
            aria-label="Close settings"
          >
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
        </div>
        <div class="settings-body">
          <label class="setting-row">
            <span class="setting-label">Proxy Server URL</span>
            <input
              type="text"
              id="proxyUrlInput"
              class="setting-input"
              placeholder="http://localhost:3000"
            />
          </label>
          <label class="setting-row">
            <span class="setting-label">Auto-highlight on summary</span>
            <div class="toggle-wrap">
              <input
                type="checkbox"
                id="autoHighlightToggle"
                class="toggle-input"
              />
              <span class="toggle-track"
                ><span class="toggle-thumb"></span
              ></span>
            </div>
          </label>
          <button class="btn-primary full-width" id="saveSettings">
            Save Settings
          </button>
          <button class="btn-ghost full-width danger" id="clearCacheBtn">
            Clear All Cached Summaries
          </button>
        </div>
      </div>
    </div>

    <script src="src/popup.js"></script>
  </body>
</html>
